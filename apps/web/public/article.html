<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='24' font-size='24'%3E3%3C/text%3E%3C/svg%3E" />
    <title>기사 보기</title>
  </head>
  <body>
    <main style="max-width: 960px; margin: 2rem auto; font-family: Arial, sans-serif;">
      <a href="/">← 홈</a>
      <h1 id="title"></h1>
      <p id="meta"></p>
      <article id="body"></article>
    </main>
    <script>
      async function load() {
        const slug = new URLSearchParams(location.search).get('slug');
        if (!slug) return;
        const res = await fetch(`/api/articles/${slug}`);
        if (!res.ok) return;
        const item = await res.json();
        document.getElementById('title').innerText = item.title || '';
        document.getElementById('meta').innerText = item.published_at || item.created_at || '';
        document.getElementById('body').innerHTML = item.body_html || '';
      }
      load();
    </script>
  </body>
</html>
