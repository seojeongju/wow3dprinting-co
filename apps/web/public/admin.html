<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='24' font-size='24'%3E3%3C/text%3E%3C/svg%3E" />
    <title>관리자 CMS</title>
  </head>
  <body style="max-width: 960px; margin: 2rem auto; font-family: Arial, sans-serif;">
    <h1>관리자 CMS</h1>
    <p>API 토큰 기반 간이 관리 페이지입니다.</p>
    <label>Admin Token <input id="token" style="width: 420px;" /></label>
    <hr />
    <h2>기사 등록</h2>
    <form id="articleForm">
      <input id="title" placeholder="제목" style="width:100%; margin-bottom:8px;" />
      <input id="summary" placeholder="요약" style="width:100%; margin-bottom:8px;" />
      <select id="status" style="margin-bottom:8px;">
        <option value="draft">draft</option>
        <option value="review">review</option>
        <option value="published">published</option>
      </select>
      <textarea id="body" placeholder="본문 HTML" style="width:100%; height:180px;"></textarea>
      <button type="submit">저장</button>
    </form>
    <pre id="result"></pre>
    <script>
      const out = document.getElementById('result');
      document.getElementById('articleForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const token = document.getElementById('token').value;
        const payload = {
          title: document.getElementById('title').value,
          summary: document.getElementById('summary').value,
          status: document.getElementById('status').value,
          body_html: document.getElementById('body').value
        };
        const res = await fetch('/api/articles', {
          method: 'POST',
          headers: {
            'content-type': 'application/json',
            authorization: `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });
        out.textContent = JSON.stringify(await res.json(), null, 2);
      });
    </script>
  </body>
</html>
