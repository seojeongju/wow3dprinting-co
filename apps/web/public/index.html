<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="3D프린팅타임즈 — 3D프린팅 산업·기술·정책 뉴스와 분석을 전하는 디지털 신문입니다."
    />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='24' font-size='24'%3E3%3C/text%3E%3C/svg%3E" />
    <title>3D프린팅타임즈</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="top-bar">
      <div class="top-bar__inner">
        <span>산업 · 기술 · 정책</span>
        <span>
          <a href="/admin.html">관리자</a>
        </span>
      </div>
    </div>

    <header class="masthead">
      <h1 class="masthead__title">3D프린팅타임즈</h1>
      <p class="masthead__tagline">3D Printing Times — Industry &amp; Innovation</p>
    </header>

    <nav class="nav" aria-label="주요 메뉴">
      <a href="/">홈</a>
      <a href="#latest">뉴스 · 최신</a>
      <a href="/admin.html">발행</a>
    </nav>

    <div class="shell">
      <div class="layout">
        <main>
          <p class="section-label">오늘의 헤드라인</p>

          <div id="featured" class="featured" hidden>
            <article class="featured__main" id="featured-main"></article>
            <div class="featured__side" id="featured-side"></div>
          </div>

          <p id="latest" class="section-label">최신 기사</p>
          <div id="latest-grid" class="latest-grid"></div>
          <p id="empty-state" class="state-msg" hidden>아직 공개된 기사가 없습니다. 관리자에서 발행해 주세요.</p>
        </main>

        <aside aria-label="사이드바">
          <div class="sidebar-block">
            <h3>인기 · 최근</h3>
            <ul id="sidebar-list" class="sidebar-list"></ul>
          </div>
          <div class="sidebar-block">
            <h3>안내</h3>
            <p style="margin: 0; font-size: 0.85rem; color: var(--muted); line-height: 1.45">
              본지는 3D프린팅 산업 동향과 기술·정책 이슈를 다룹니다. 레이아웃은 우선 확정한 뒤 대량 데이터 이관을 진행합니다.
            </p>
          </div>
        </aside>
      </div>
    </div>

    <footer class="site-footer">
      <p>&copy; 3D프린팅타임즈. All rights reserved.</p>
    </footer>

    <script>
      function mediaUrl(key) {
        if (!key) return "";
        return "/media/" + encodeURI(String(key).replace(/^\/+/, ""));
      }

      function formatWhen(iso) {
        if (!iso) return "";
        try {
          const d = new Date(iso);
          return d.toLocaleDateString("ko-KR", {
            year: "numeric",
            month: "long",
            day: "numeric",
          });
        } catch {
          return iso;
        }
      }

      function articleHref(slug) {
        return "/news/" + encodeURIComponent(slug);
      }

      function renderFeatured(items) {
        const wrap = document.getElementById("featured");
        const mainEl = document.getElementById("featured-main");
        const sideEl = document.getElementById("featured-side");
        if (!items.length) {
          wrap.hidden = true;
          return;
        }
        wrap.hidden = false;
        const lead = items[0];
        const img = mediaUrl(lead.hero_image_r2_key);
        mainEl.innerHTML = `
          <a href="${articleHref(lead.slug)}" class="featured__media">
            ${
              img
                ? `<img src="${img}" alt="" loading="eager" />`
                : `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.85rem;">이미지 없음</div>`
            }
          </a>
          <p class="featured__kicker">헤드라인</p>
          <h2 class="featured__headline"><a href="${articleHref(lead.slug)}">${escapeHtml(lead.title)}</a></h2>
          <p class="featured__deck">${escapeHtml(lead.summary || "")}</p>
        `;

        const subs = items.slice(1, 4);
        sideEl.innerHTML = subs
          .map(
            (a) => `
          <article class="mini-card">
            <a href="${articleHref(a.slug)}" class="mini-card__thumb">
              ${
                mediaUrl(a.hero_image_r2_key)
                  ? `<img src="${mediaUrl(a.hero_image_r2_key)}" alt="" loading="lazy" />`
                  : ""
              }
            </a>
            <div>
              <span class="mini-card__kicker">기사</span>
              <h3 class="mini-card__title"><a href="${articleHref(a.slug)}">${escapeHtml(a.title)}</a></h3>
            </div>
          </article>
        `
          )
          .join("");
      }

      function renderLatest(items) {
        const grid = document.getElementById("latest-grid");
        const skip = Math.min(4, items.length);
        const rest = items.slice(skip);
        grid.innerHTML = rest
          .map(
            (a) => `
          <article class="card">
            <a href="${articleHref(a.slug)}" class="card__thumb">
              ${
                mediaUrl(a.hero_image_r2_key)
                  ? `<img src="${mediaUrl(a.hero_image_r2_key)}" alt="" loading="lazy" />`
                  : `<div style="height:100%;min-height:120px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.8rem;">No image</div>`
              }
            </a>
            <h3 class="card__title"><a href="${articleHref(a.slug)}">${escapeHtml(a.title)}</a></h3>
            <p class="card__meta">${formatWhen(a.published_at || a.created_at)}</p>
          </article>
        `
          )
          .join("");
      }

      function renderSidebar(items) {
        const ul = document.getElementById("sidebar-list");
        ul.innerHTML = items
          .slice(0, 10)
          .map(
            (a) => `
          <li><a href="${articleHref(a.slug)}">${escapeHtml(a.title)}</a></li>
        `
          )
          .join("");
      }

      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s == null ? "" : String(s);
        return d.innerHTML;
      }

      async function load() {
        const empty = document.getElementById("empty-state");
        try {
          const res = await fetch("/api/articles");
          if (!res.ok) throw new Error(String(res.status));
          const data = await res.json();
          const items = data.items || [];
          if (!items.length) {
            empty.hidden = false;
            document.getElementById("featured").hidden = true;
            document.getElementById("latest-grid").innerHTML = "";
            document.getElementById("sidebar-list").innerHTML = "";
            return;
          }
          empty.hidden = true;
          renderFeatured(items);
          renderLatest(items);
          renderSidebar(items);
        } catch (e) {
          empty.hidden = false;
          empty.textContent = "기사 목록을 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.";
        }
      }

      load();
    </script>
  </body>
</html>
