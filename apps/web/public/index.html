<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='24' font-size='24'%3E3%3C/text%3E%3C/svg%3E" />
    <title>3D프린팅타임즈</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
      .item { border-bottom: 1px solid #ddd; padding: 1rem 0; }
      .meta { color: #666; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <h1>3D프린팅타임즈</h1>
    <p><a href="/admin.html">관리자(CMS)</a></p>
    <div id="list"></div>
    <script>
      async function load() {
        const res = await fetch('/api/articles');
        const data = await res.json();
        const list = document.getElementById('list');
        list.innerHTML = (data.items || [])
          .map((item) => `
            <div class="item">
              <h3><a href="/article.html?slug=${item.slug}">${item.title}</a></h3>
              <p class="meta">${item.published_at || item.created_at || ''}</p>
              <p>${item.summary || ''}</p>
            </div>
          `)
          .join('');
      }
      load();
    </script>
  </body>
</html>
